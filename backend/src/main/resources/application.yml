spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/euprocuro}
      auto-index-creation: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info

application:
  auth:
    session-hours: ${APP_AUTH_SESSION_HOURS:168}
    password-reset-hours: ${APP_AUTH_PASSWORD_RESET_HOURS:2}
    reset-base-url: ${APP_RESET_BASE_URL:http://localhost:5173}
    expose-reset-preview: ${APP_AUTH_EXPOSE_RESET_PREVIEW:true}
    expose-session-token: ${APP_AUTH_EXPOSE_SESSION_TOKEN:true}
    cookie:
      name: ${APP_AUTH_COOKIE_NAME:EU_PROCURO_SESSION}
      secure: ${APP_AUTH_COOKIE_SECURE:false}
      same-site: ${APP_AUTH_COOKIE_SAME_SITE:Lax}
      domain: ${APP_AUTH_COOKIE_DOMAIN:}
  email:
    from: ${APP_EMAIL_FROM:no-reply@euprocuro.local}
  monetization:
    provider: ${APP_MONETIZATION_PROVIDER:LOCAL_MOCK}
    local-checkout:
      base-url: ${LOCAL_CHECKOUT_BASE_URL:http://localhost:8080/api/monetization/local-checkout/approve}
      success-url: ${LOCAL_CHECKOUT_SUCCESS_URL:http://localhost:5173?payment=success}
    mercado-pago:
      access-token: ${MERCADO_PAGO_ACCESS_TOKEN:}
      sandbox: ${MERCADO_PAGO_SANDBOX:true}
      success-url: ${MERCADO_PAGO_SUCCESS_URL:http://localhost:5173?payment=success}
      failure-url: ${MERCADO_PAGO_FAILURE_URL:http://localhost:5173?payment=failure}
      pending-url: ${MERCADO_PAGO_PENDING_URL:http://localhost:5173?payment=pending}
      notification-url: ${MERCADO_PAGO_NOTIFICATION_URL:}
      webhook-secret: ${MERCADO_PAGO_WEBHOOK_SECRET:}
      webhook-signature-required: ${MERCADO_PAGO_WEBHOOK_SIGNATURE_REQUIRED:true}
    catalog:
      credits-10:
        price: ${APP_PRODUCT_CREDITS_10_PRICE:9.90}
        credits: ${APP_PRODUCT_CREDITS_10_AMOUNT:10}
        enabled: ${APP_PRODUCT_CREDITS_10_ENABLED:true}
      credits-30:
        price: ${APP_PRODUCT_CREDITS_30_PRICE:24.90}
        credits: ${APP_PRODUCT_CREDITS_30_AMOUNT:30}
        enabled: ${APP_PRODUCT_CREDITS_30_ENABLED:true}
      seller-pro:
        price: ${APP_PRODUCT_SELLER_PRO_PRICE:49.90}
        duration-days: ${APP_PRODUCT_SELLER_PRO_DURATION_DAYS:30}
        enabled: ${APP_PRODUCT_SELLER_PRO_ENABLED:true}
      boost-3-days:
        price: ${APP_PRODUCT_BOOST_3_DAYS_PRICE:9.90}
        duration-days: ${APP_PRODUCT_BOOST_3_DAYS_DURATION_DAYS:3}
        enabled: ${APP_PRODUCT_BOOST_3_DAYS_ENABLED:true}
      boost-7-days:
        price: ${APP_PRODUCT_BOOST_7_DAYS_PRICE:19.90}
        duration-days: ${APP_PRODUCT_BOOST_7_DAYS_DURATION_DAYS:7}
        enabled: ${APP_PRODUCT_BOOST_7_DAYS_ENABLED:true}
  listings:
    expiration-days: ${APP_LISTING_EXPIRATION_DAYS:5}
    cleanup:
      enabled: ${APP_LISTING_CLEANUP_ENABLED:true}
      fixed-delay-ms: ${APP_LISTING_CLEANUP_FIXED_DELAY_MS:3600000}
  hml:
    access:
      enabled: ${APP_HML_ACCESS_ENABLED:false}
      allowed-emails: ${APP_HML_ALLOWED_EMAILS:}
  messaging:
    rabbit:
      exchange: ${APP_RABBIT_EXCHANGE:euprocuro.exchange}
      interest-created-queue: ${APP_RABBIT_INTEREST_CREATED_QUEUE:euprocuro.interest.created}
      offer-created-queue: ${APP_RABBIT_OFFER_CREATED_QUEUE:euprocuro.offer.created}
      conversation-message-created-queue: ${APP_RABBIT_CONVERSATION_MESSAGE_CREATED_QUEUE:euprocuro.conversation.message.created}
      auth-queue: ${APP_RABBIT_AUTH_QUEUE:euprocuro.auth.events}
  security:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    rate-limit:
      enabled: ${APP_RATE_LIMIT_ENABLED:true}
      window-seconds: ${APP_RATE_LIMIT_WINDOW_SECONDS:300}
      max-requests: ${APP_RATE_LIMIT_MAX_REQUESTS:25}
